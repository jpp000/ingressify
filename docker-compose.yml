services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ingressify
      POSTGRES_USER: ingressify
      POSTGRES_PASSWORD: ingressify
    ports:
      - "5432:5432"
    volumes:
      - ingressify_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingressify -d ingressify"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: desenvolvimento
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ingressify
      SPRING_DATASOURCE_USERNAME: ingressify
      SPRING_DATASOURCE_PASSWORD: ingressify
      APP_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

  frontend:
    build:
      context: ./presentation-frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  ingressify_pg_data:
